<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - DANEKERTI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="site-title">
            <h1>DANEKERTI</h1>
            <p>MEET EVERYONE'S NEEDS</p>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html" class="cart-icon active">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a></li>
            </ul>
        </nav>
    </header>

    <main class="container py-5 my-4 cart-page">
        <h2 class="display-6 fw-bold mb-5" style="color: var(--primary);"><i class="fas fa-shopping-cart me-3"></i>Your Shopping Cart</h2>
        
        <div class="row g-5">
            <div class="col-lg-8">
                <div id="cart-items" class="d-flex flex-column gap-3">
                    <div class="alert alert-info border-0 shadow-sm text-center py-5" style="border-radius: 20px;">
                        <i class="fas fa-box-open fs-1 text-muted mb-3 d-block"></i>
                        Keranjangmu masih kosong. Mulai belanja sekarang!
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-lg p-4" style="border-radius: 20px; position: sticky; top: 120px;">
                    <h4 class="fw-bold mb-4 border-bottom pb-3">Order Summary</h4>
                    
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Subtotal</span>
                        <span id="cart-subtotal" class="fw-semibold">Rp 0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Shipping</span>
                        <span id="shipping-cost" class="fw-semibold">Rp 0</span>
                    </div>
                    
                    <hr class="my-3 border-light">
                    
                    <div class="d-flex justify-content-between mb-4 mt-2">
                        <span class="fw-bold fs-5">Total</span>
                        <span id="cart-total" class="fw-bold fs-4" style="color: var(--primary);">Rp 0</span>
                    </div>

                    <button id="checkout-button" class="btn w-100 py-3 shadow-sm text-white fw-bold fs-5 rounded-pill" style="background: linear-gradient(135deg, var(--primary), var(--primary-light)); border: none;">
                        Proceed to Checkout <i class="fas fa-arrow-right ms-2"></i>
                    </button>

                    <div class="mt-4 text-center text-muted small">
                        <i class="fas fa-lock me-1"></i> Secure Checkout Process
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
